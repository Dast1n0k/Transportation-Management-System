<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8' />
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <link rel='stylesheet' href='https://unpkg.com/leaflet/dist/leaflet.css'/>
    <script src='https://unpkg.com/leaflet/dist/leaflet.js'></script>
    <style>
        #map { height: 100vh; width: 100%; }
        body { margin:0; padding:0; }
    </style>
</head>
<body>
    <div id='map'></div>
    <script>
        // Ограничивающий прямоугольник США
        var usaBounds = L.latLngBounds(
            [24.396308, -125.000000], // юго-запад
            [49.384358, -66.934570]   // северо-восток
        );

        // Инициализация карты
        var map = L.map('map', {
            zoomControl: true,
            maxBounds: usaBounds,
            maxBoundsViscosity: 1.0
        });

        // Подложка
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        // Центрируем на США
        map.fitBounds(usaBounds);

        // Пример: маркер в Нью-Йорке (ZIP 10001)
        L.marker([40.7506, -73.9970]).addTo(map)
            .bindPopup('Водитель: ZIP 10001')
            .openPopup();
    </script>
</body>
</html>
